<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        // ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyD5rY0AR39UOWFa1RtWwb5oYLendr--RGs",
            authDomain: "sohoz-cfe38.firebaseapp.com",
            projectId: "sohoz-cfe38",
            storageBucket: "sohoz-cfe38.firebasestorage.app",
            messagingSenderId: "206146864882",
            appId: "1:206146864882:web:5a3680ae96ecbf4106726b",
            measurementId: "G-7WFLVEPETJ"
        };

        // ফায়ারবেস ইনিশিয়ালাইজেশন
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // গ্লোবাল ফি কনফিগারেশন
        const AGENCY_FEE_PERCENT = 0.05; 
        const USER_FEE_PERCENT = 0.05;   
        const REFERRAL_COMMISSION_PERCENT = 0.01; 

        // উইন্ডো অবজেক্টে ফাংশন গ্লোবাল করা
        window.handleAuth = handleAuth;
        window.toggleAuthMode = toggleAuthMode;
        window.handleLogout = handleLogout;
        window.agencyDeposit = agencyDeposit;
        window.upgradeAgency = upgradeAgency;
        window.uploadTask = uploadTask;
        window.agencyDecision = agencyDecision;
        window.verifyUserWithNid = verifyUserWithNid;
        window.upgradeUser = upgradeUser;
        window.takeSkillTest = takeSkillTest;
        window.claimTask = claimTask;
        window.lockTask = lockTask;
        window.sendMessage = sendMessage;
        window.submitReferral = submitReferral;
        window.submitAdminCredentials = submitAdminCredentials;
        window.closeAdminModal = closeAdminModal;
        window.adminReleasePayment = adminReleasePayment;
        window.adminDeleteUser = adminDeleteUser;
        window.adminDeleteTask = adminDeleteTask;

        let currentUserData = null;
        let globalSystemState = {};

        // অ্যালার্ট সিস্টেম
        function showAlert(msg) {
            const box = document.getElementById('alertBox');
            box.innerText = msg;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }

        // অথেনটিকেশন স্টেট পর্যবেক্ষণ
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snapshot = await get(ref(db, 'users/' + user.uid));
                if (snapshot.exists()) {
                    currentUserData = snapshot.val();
                    currentUserData.uid = user.uid;
                    showMainPlatform();
                } else {
                    // যদি ডাটাবেজে ডাটা আসতে সামান্য দেরি হয়, তবে আবার ট্রাই করবে
                    setTimeout(async () => {
                        const retrySnapshot = await get(ref(db, 'users/' + user.uid));
                        if (retrySnapshot.exists()) {
                            currentUserData = retrySnapshot.val();
                            currentUserData.uid = user.uid;
                            showMainPlatform();
                        }
                    }, 1000);
                }
            } else {
                currentUserData = null;
                showAuthScreen();
            }
        });

        // লাইভ ডাটা সিঙ্ক
        onValue(ref(db), (snapshot) => {
            if (snapshot.exists()) {
                globalSystemState = snapshot.val();
                document.getElementById('jsonDisplay').textContent = JSON.stringify(globalSystemState, null, 4);
                
                // ইউজার লগইন থাকা অবস্থায় রিয়েল-টাইম প্রোফাইল ডাটা সিঙ্ক ধরে রাখা
                if (auth.currentUser && globalSystemState.users && globalSystemState.users[auth.currentUser.uid]) {
                    currentUserData = globalSystemState.users[auth.currentUser.uid];
                    currentUserData.uid = auth.currentUser.uid;
                    showMainPlatform(); 
                }
                
                updateUI();
                updateAdminPanel();
            }
        });

        // লগইন ও রেজিস্ট্রেশন প্রসেস
        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            const role = document.getElementById('authRole').value;
            const name = document.getElementById('authName').value.trim();
            const isRegister = !document.getElementById('registerFields').classList.contains('hidden');

            if (!email || !password) { showAlert("ইমেইল এবং পাসওয়ার্ড সঠিকভাবে দিন!"); return; }

            try {
                if (isRegister) {
                    if (!name) { showAlert("দয়া করে নাম লিখুন!"); return; }
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const uid = userCredential.user.uid;
                    
                    const defaultUserData = {
                        name: name,
                        email: email,
                        role: role,
                        balance: role === 'agency' ? 500 : 0, 
                        tier: "NORMAL",
                        isVerified: false,
                        claimsToday: 0,
                        tasksPostedThisMonth: 0,
                        badges: [],
                        rating: 0.0,
                        totalRatingsCount: 0,
                        referredBy: ""
                    };
                    await set(ref(db, 'users/' + uid), defaultUserData);
                    currentUserData = defaultUserData;
                    currentUserData.uid = uid;
                    showMainPlatform();
                    showAlert("রেজিস্ট্রেশন সফল হয়েছে!");
                } else {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const snapshot = await get(ref(db, 'users/' + userCredential.user.uid));
                    if (snapshot.exists()) {
                        currentUserData = snapshot.val();
                        currentUserData.uid = userCredential.user.uid;
                        showMainPlatform();
                    }
                    showAlert("লগইন সফল হয়েছে!");
                }
            } catch (error) {
                showAlert("ত্রুটি: " + error.message);
            }
        }

        function toggleAuthMode() {
            const regFields = document.getElementById('registerFields');
            const authBtn = document.getElementById('authBtn');
            const toggleLink = document.getElementById('toggleLink');
            if (regFields.classList.contains('hidden')) {
                regFields.classList.remove('hidden');
                authBtn.innerText = "রেজিস্ট্রেশন করুন";
                toggleLink.innerText = "ইতিমধ্যেই অ্যাকাউন্ট আছে? লগইন করুন";
            } else {
                regFields.classList.add('hidden');
                authBtn.innerText = "লগইন করুন";
                toggleLink.innerText = "নতুন অ্যাকাউন্ট তৈরি করতে চান? রেজিস্টার করুন";
            }
        }

        function handleLogout() {
            signOut(auth).then(() => {
                document.getElementById('adminPanelCard').classList.add('hidden');
                showAlert("লগআউট সফল হয়েছে!");
            });
        }

        function showAuthScreen() {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('mainPlatform').classList.add('hidden');
            document.getElementById('mainNavbar').classList.add('hidden');
        }

        function showMainPlatform() {
            if (!currentUserData) return;
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainPlatform').classList.remove('hidden');
            document.getElementById('mainNavbar').classList.remove('hidden');
            
            document.getElementById('displayUserName').innerText = currentUserData.name + ` (${currentUserData.role.toUpperCase()})`;
            
            if (currentUserData.role === 'agency') {
                document.getElementById('agencySection').classList.remove('hidden');
                document.getElementById('workerSection').classList.add('hidden');
            } else {
                document.getElementById('agencySection').classList.add('hidden');
                document.getElementById('workerSection').classList.remove('hidden');
            }
        }

        // এজেন্সি: ডিপোজিট
        async function agencyDeposit() {
            if (!currentUserData) return;
            const newBalance = (currentUserData.balance || 0) + 500;
            await update(ref(db, 'users/' + currentUserData.uid), { balance: newBalance });
            showAlert("৳৫০০ ডিপোজিট সফল হয়েছে!");
        }

        // এজেন্সি: প্রিমিয়াম সাবস্ক্রিপশন
        async function upgradeAgency() {
            if (currentUserData.balance < 200) { showAlert("পর্যাপ্ত ব্যালেন্স নেই! প্রিমিয়াম কিনতে ৳২০০ লাগবে।"); return; }
            const newBalance = currentUserData.balance - 200;
            await update(ref(db, 'users/' + currentUserData.uid), { balance: newBalance, tier: "PREMIUM" });
            
            const currentEarnings = globalSystemState.companyEarnings || 0;
            await set(ref(db, 'companyEarnings'), currentEarnings + 200);
            showAlert("এজেন্সি সফলভাবে PREMIUM সাবস্ক্রিপশন কিনেছে!");
        }

        // এজেন্সি: টাস্ক আপলোড
        async function uploadTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const budget = Number(document.getElementById('taskBudget').value);
            const desc = document.getElementById('taskDesc').value.trim();

            if (!title || !budget) { showAlert("টাইটেল এবং বাজেট সঠিকভাবে লিখুন!"); return; }
            if (currentUserData.tier === "NORMAL" && (currentUserData.tasksPostedThisMonth || 0) >= 3) {
                showAlert("নরমাল এজেন্সির ফ্রি লিমিট (৩টি টাস্ক) শেষ! প্রিমিয়াম নিন।"); return;
            }
            if (currentUserData.balance < budget) { showAlert("আপনার অ্যাকাউন্টে পর্যাপ্ত বাজেট নেই!"); return; }

            const taskId = "task_" + Date.now();
            const newTask = {
                id: taskId,
                title: title,
                description: desc,
                budget: budget,
                status: "OPEN",
                agencyUid: currentUserData.uid,
                agencyName: currentUserData.name,
                claimedByUid: "",
                claimedByName: "",
                escrowAmount: 0
            };

            await set(ref(db, 'tasks/' + taskId), newTask);
            await update(ref(db, 'users/' + currentUserData.uid), { 
                tasksPostedThisMonth: (currentUserData.tasksPostedThisMonth || 0) + 1 
            });

            showAlert(`টাস্ক সফলভাবে পাবলিশ হয়েছে! আইডি: ${taskId}`);
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskBudget').value = '';
            document.getElementById('taskDesc').value = '';
        }

        // ইউজার ভেরিফিকেশন
        async function verifyUserWithNid() {
            const frontPic = document.getElementById('nidFront').files[0];
            const backPic = document.getElementById('nidBack').files[0];

            if (!frontPic || !backPic) {
                showAlert("দয়া করে NID কার্ডের সামনের এবং পেছনের উভয় অংশের ছবি সিলেক্ট করুন!");
                return;
            }

            let badges = currentUserData.badges || [];
            if (!badges.includes("Verified")) badges.push("Verified");
            
            await update(ref(db, 'users/' + currentUserData.uid), { 
                isVerified: true, 
                badges: badges,
                nidFrontUploaded: frontPic.name,
                nidBackUploaded: backPic.name
            });
            
            showAlert("NID কার্ডের ছবিসহ অ্যাকাউন্ট সফলভাবে ভেরিফাইড হয়েছে!");
        }

        // ইউজার: প্রো মেম্বারশিপ
        async function upgradeUser() {
            await update(ref(db, 'users/' + currentUserData.uid), { tier: "PRO" });
            const currentEarnings = globalSystemState.companyEarnings || 0;
            await set(ref(db, 'companyEarnings'), currentEarnings + 100);
            showAlert("অভিনন্দন! আপনি এখন PRO Worker মেম্বার।");
        }

        // ইউজার: স্কিল টেস্ট
        async function takeSkillTest() {
            let badges = currentUserData.badges || [];
            if (!badges.includes("Verified Expert")) {
                badges.push("Verified Expert");
                await update(ref(db, 'users/' + currentUserData.uid), { 
                    badges: badges, 
                    rating: 5.0, 
                    totalRatingsCount: 1 
                });
                showAlert("আপনি স্কিল টেস্টে পাস করেছেন এবং 'Verified Expert' ব্যাজ পেয়েছেন!");
            } else {
                showAlert("আপনি ইতিমধ্যেই ভেরিফাইড এক্সপার্ট!");
            }
        }

        // ইউজার: কাজ ক্লেইম করা
        async function claimTask() {
            const taskId = document.getElementById('claimTaskId').value.trim();
            if (!taskId) { showAlert("টাস্ক আইডি দিন!"); return; }
            if (!currentUserData.isVerified) { showAlert("প্রথমে NID ভেরিফাই করুন!"); return; }
            if (currentUserData.tier === "NORMAL" && (currentUserData.claimsToday || 0) >= 2) {
                showAlert("নরমাল ইউজারের আজকের লিমিট শেষ! প্রো মেম্বার হোন।"); return;
            }

            const taskSnapshot = await get(ref(db, 'tasks/' + taskId));
            if (!taskSnapshot.exists()) { showAlert("এই আইডির কোনো কাজ পাওয়া যায়নি!"); return; }
            
            const task = taskSnapshot.val();
            if (task.status !== "OPEN") { showAlert("এই কাজটি ইতিমধ্যে ক্লেইম বা লক হয়ে গেছে।"); return; }

            await update(ref(db, 'tasks/' + taskId), {
                status: "CLAIMED",
                claimedByUid: currentUserData.uid,
                claimedByName: currentUserData.name
            });

            await update(ref(db, 'users/' + currentUserData.uid), { claimsToday: (currentUserData.claimsToday || 0) + 1 });
            showAlert("কাজটি সফলভাবে ক্লেইম হয়েছে! এখন চ্যাটে এজেন্সির সাথে কথা বলুন।");
            document.getElementById('claimTaskId').value = '';
        }

        // ইউজার/এজেন্সি: বাজেট লক ও এসক্রো করা
        async function lockTask() {
            const taskId = document.getElementById('lockTaskId').value.trim();
            if (!taskId) { showAlert("টাস্ক আইডি দিন!"); return; }

            const taskSnapshot = await get(ref(db, 'tasks/' + taskId));
            if (!taskSnapshot.exists()) { showAlert("টাস্ক পাওয়া যায়নি!"); return; }

            const task = taskSnapshot.val();
            if (task.status !== "CLAIMED") { showAlert("টাস্কটি লক করার আগে কোনো ইউজার দ্বারা ক্লেইম হতে হবে।"); return; }

            const agencySnapshot = await get(ref(db, 'users/' + task.agencyUid));
            const agency = agencySnapshot.val();

            if (agency.balance < task.budget) { showAlert("এজেন্সির ব্যালেন্স কম থাকায় ফান্ড এসক্রো করা যাচ্ছে না!"); return; }

            await update(ref(db, 'users/' + task.agencyUid), { balance: agency.balance - task.budget });
            await update(ref(db, 'tasks/' + taskId), {
                status: "LOCKED_IN_ESCROW",
                escrowAmount: task.budget
            });

            showAlert(`টাস্ক ${taskId} লক করা হয়েছে এবং বাজেট ৳${task.budget} এসক্রোতে সুরক্ষিত আছে!`);
            document.getElementById('lockTaskId').value = '';
        }

        // চ্যাট মেকানিজম
        async function sendMessage() {
            const input = document.getElementById('chatMsgInput');
            let text = input.value.trim();
            if (!text) return;

            const scamPattern = /(01[3-9]\d{8}|whatsapp|telegram|bkash|nagad|number|নম্বর)/i;
            let senderName = currentUserData ? currentUserData.name : "Anonymous";
            let isWarning = false;

            if (scamPattern.test(text)) {
                text = "⚠️ মেসেজ ব্লক করা হয়েছে! প্ল্যাটফর্মের বাইরে কন্টাক্ট শেয়ার করা সম্পূর্ণ নিষিদ্ধ।";
                senderName = "🛡️ সিস্টেম সিকিউরিটি";
                isWarning = true;
                showAlert("নিরাপত্তা জনিত কারণে আপনার মেসেজটি ফিল্টার করা হয়েছে!");
            }

            const chatRef = ref(db, 'chats');
            const currentChatsSnapshot = await get(chatRef);
            let chats = [];
            if (currentChatsSnapshot.exists()) {
                chats = currentChatsSnapshot.val();
            }
            chats.push({ sender: senderName, text: text, isWarning: isWarning });
            await set(chatRef, chats);
            input.value = '';
        }

        // রেফারেল কোড সাবমিট
        async function submitReferral() {
            const refCode = document.getElementById('referralInput').value.trim();
            if (refCode === "SOHOZ-FAHAD-510") {
                await update(ref(db, 'users/' + currentUserData.uid), { referredBy: "Fahad" });
                showAlert("রেফারেল কোড সফলভাবে একটিভ হয়েছে!");
            } else {
                showAlert("ভুল রেফারেল কোড!");
            }
            document.getElementById('referralInput').value = '';
        }

        // এজেন্সি ডিসিশন
        async function agencyDecision(action) {
            const taskId = document.getElementById('agencyActionTaskId').value.trim();
            if (!taskId) { showAlert("টাস্ক আইডি দিন!"); return; }

            const taskSnapshot = await get(ref(db, 'tasks/' + taskId));
            if (!taskSnapshot.exists()) { showAlert("টাস্ক পাওয়া যায়নি!"); return; }

            const task = taskSnapshot.val();
            if (task.status !== "LOCKED_IN_ESCROW") { showAlert("টাস্কটি লকড অবস্থায় থাকতে হবে!"); return; }

            if (action === 'APPROVE') {
                await processPayout(task);
                showAlert("কাজটি আপনি Approve করেছেন। পেমেন্ট রিলিজ হয়েছে!");
            } else if (action === 'REJECT') {
                showAlert("আপনি কাজটি সাময়িকভাবে রিজেক্ট করেছেন। ওয়ার্কারকে চ্যাটে জানান।");
            } else if (action === 'DISPUTED') {
                await update(ref(db, 'tasks/' + taskId), { status: "DISPUTED" });
                showAlert("ডিসপ্যুট ফাইল করা হয়েছে! অ্যাডমিন প্যানেল এটি সমাধান করবে।");
            }
            document.getElementById('agencyActionTaskId').value = '';
        }

        // কোর পেমেন্ট প্রসেসিং
        async function processPayout(task) {
            const totalBudget = task.escrowAmount;
            const agencyFee = totalBudget * AGENCY_FEE_PERCENT;
            const userFee = totalBudget * USER_FEE_PERCENT;
            let companyProfit = agencyFee + userFee;
            let finalUserPayout = totalBudget - userFee;

            const workerSnapshot = await get(ref(db, 'users/' + task.claimedByUid));
            if (workerSnapshot.exists()) {
                const worker = workerSnapshot.val();
                
                if (worker.referredBy) {
                    const referralBonus = totalBudget * REFERRAL_COMMISSION_PERCENT;
                    companyProfit -= referralBonus;
                }

                await update(ref(db, 'users/' + task.claimedByUid), {
                    balance: (worker.balance || 0) + finalUserPayout,
                    totalRatingsCount: (worker.totalRatingsCount || 0) + 1,
                    rating: 4.9
                });
            }

            const currentEarnings = globalSystemState.companyEarnings || 0;
            await set(ref(db, 'companyEarnings'), currentEarnings + companyProfit);

            await update(ref(db, 'tasks/' + task.id), {
                status: "COMPLETED",
                escrowAmount: 0
            });
        }

        // সিক্রেট অ্যাডমিন ভেরিফিকেশন লজিক
        function submitAdminCredentials() {
            const id = document.getElementById('modalAdminId').value.trim();
            const pass = document.getElementById('modalAdminPass').value.trim();

            if (id === "236533" && pass === "Fahad236533") {
                closeAdminModal();
                document.getElementById('adminPanelCard').classList.remove('hidden');
                showAlert("👨‍⚖️ অ্যাডমিন কন্ট্রোল প্যানেল সফলভাবে আনলক হয়েছে!");
                document.getElementById('adminPanelCard').scrollIntoView({ behavior: 'smooth' });
            } else {
                showAlert("❌ ভুল অ্যাডমিন আইডি বা পাসওয়ার্ড!");
            }
        }

        function closeAdminModal() {
            document.getElementById('adminAuthModal').classList.add('hidden');
            document.getElementById('modalAdminId').value = '';
            document.getElementById('modalAdminPass').value = '';
        }

        // Ctrl + Shift + A কি-বোর্ড শর্টকাট লিসেনার
        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && (e.key === 'A' || e.key === 'a')) {
                e.preventDefault();
                const adminPanel = document.getElementById('adminPanelCard');
                
                if (!adminPanel.classList.contains('hidden')) {
                    adminPanel.classList.add('hidden');
                    showAlert("🔒 অ্যাডমিন প্যানেল হাইড করা হয়েছে!");
                } else {
                    document.getElementById('adminAuthModal').classList.remove('hidden');
                }
            }
        });

        async function adminReleasePayment(isSuccess) {
            const taskId = document.getElementById('adminTaskId').value.trim();
            const agencyConf = document.getElementById('agencyConf').checked;
            const userConf = document.getElementById('userConf').checked;

            if (!taskId) { showAlert("টাস্ক আইডি দিন!"); return; }

            const taskSnapshot = await get(ref(db, 'tasks/' + taskId));
            if (!taskSnapshot.exists()) { showAlert("টাস্ক পাওয়া যায়নি!"); return; }
            const task = taskSnapshot.val();

            if (isSuccess) {
                if (!agencyConf || !userConf) { showAlert("ম্যানুয়াল ریلیজে দুই পক্ষের কনফার্মেশন টিক দিন!"); return; }
                await processPayout(task);
                showAlert("অ্যাডমিন প্যানেল থেকে সফলভাবে পেমেন্ট রিলিজ করা হয়েছে!");
            } else {
                const agencySnapshot = await get(ref(db, 'users/' + task.agencyUid));
                if (agencySnapshot.exists()) {
                    const agency = agencySnapshot.val();
                    await update(ref(db, 'users/' + task.agencyUid), { balance: (agency.balance || 0) + task.escrowAmount });
                }
                await update(ref(db, 'tasks/' + taskId), { status: "COMPLETED", escrowAmount: 0 });
                showAlert("অ্যাডমিন কাজ বাতিল করে সম্পূ্র্ণ ফান্ড এজেন্সিকে ফেরত দিয়েছে!");
            }
            document.getElementById('adminTaskId').value = '';
        }

        // অ্যাডমিন প্যানেলে লাইভ ডাটা ডিলিট করার লজিক
        async function adminDeleteUser(uid) {
            if (confirm("আপনি কি নিশ্চিতভাবে এই ইউজারটিকে ডাটাবেজ থেকে ডিলিট করতে চান?")) {
                await remove(ref(db, 'users/' + uid));
                showAlert("ইউজার ডাটাবেজ থেকে ডিলিট করা হয়েছে!");
            }
        }

        async function adminDeleteTask(taskId) {
            if (confirm("আপনি কি নিশ্চিতভাবে এই টাস্কটি ডাটাবেজ থেকে ডিলিট করতে চান?")) {
                await remove(ref(db, 'tasks/' + taskId));
                showAlert("টাস্ক ডাটাবেজ থেকে ডিলিট করা হয়েছে!");
            }
        }

        // অ্যাডমিন প্যানেলে ইউজার ও টাস্কের অল হিস্ট্রি এবং ডিলিট কন্ট্রোল রেন্ডারিং
        function updateAdminPanel() {
            const userTableBody = document.getElementById('adminUserHistoryBody');
            if(!userTableBody) return;
            userTableBody.innerHTML = '';
            if (globalSystemState.users) {
                Object.keys(globalSystemState.users).forEach(uid => {
                    const u = globalSystemState.users[uid];
                    let row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${u.name || 'N/A'}</strong></td>
                        <td>${u.email || 'N/A'}</td>
                        <td><span class="badge badge-normal">${u.role ? u.role.toUpperCase() : 'WORKER'}</span></td>
                        <td>৳${u.balance || 0}</td>
                        <td>${u.isVerified ? '✅ ভেরিফাইড' : '❌ আনভেরিফাইড'}</td>
                        <td><button onclick="adminDeleteUser('${uid}')" class="logout-btn btn-danger-small">Delete</button></td>
                    `;
                    userTableBody.appendChild(row);
                });
            } else {
                userTableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;">কোনো ইউজার হিস্ট্রি পাওয়া যায়নি</td></tr>`;
            }

            const taskTableBody = document.getElementById('adminTaskHistoryBody');
            if(!taskTableBody) return;
            taskTableBody.innerHTML = '';
            if (globalSystemState.tasks) {
                Object.keys(globalSystemState.tasks).forEach(tid => {
                    const t = globalSystemState.tasks[tid];
                    let row = document.createElement('tr');
                    row.innerHTML = `
                        <td><code>${t.id}</code></td>
                        <td>${t.title}</td>
                        <td>৳${t.budget}</td>
                        <td><span class="status-tag status-${t.status}">${t.status}</span></td>
                        <td>${t.agencyName || 'N/A'}</td>
                        <td><button onclick="adminDeleteTask('${tid}')" class="logout-btn btn-danger-small">Delete</button></td>
                    `;
                    taskTableBody.appendChild(row);
                });
            } else {
                taskTableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;">কোনো টাস্ক হিস্ট্রি পাওয়া যায়নি</td></tr>`;
            }
        }

        // রিয়েল-টাইম ইন্টারফেস আপডেট
        function updateUI() {
            if (!currentUserData) return;

            const myLatestData = globalSystemState.users ? globalSystemState.users[currentUserData.uid] : null;
            if (myLatestData) {
                if (currentUserData.role === 'agency') {
                    document.getElementById('agencyBalance').innerText = myLatestData.balance || 0;
                    document.getElementById('agencyTier').innerText = myLatestData.tier || "NORMAL";
                    document.getElementById('agencyTier').className = "badge " + (myLatestData.tier === 'PREMIUM' ? 'badge-premium' : 'badge-normal');
                } else {
                    document.getElementById('userBalance').innerText = myLatestData.balance || 0;
                    document.getElementById('userVerifyBadge').innerText = myLatestData.isVerified ? "ভেরিফাইড ✓" : "আনভেরিফাইড";
                    document.getElementById('userVerifyBadge').className = "badge " + (myLatestData.isVerified ? 'badge-verified' : 'status-DISPUTED');
                    document.getElementById('userTier').innerText = myLatestData.tier || "NORMAL";
                    document.getElementById('userTier').className = "badge " + (myLatestData.tier === 'PRO' ? 'badge-premium' : 'badge-normal');
                    document.getElementById('userRating').innerText = (myLatestData.rating || 0).toFixed(1) + " ★";
                }
            }

            if(document.getElementById('companyEarnings')) {
                document.getElementById('companyEarnings').innerText = globalSystemState.companyEarnings || 0;
            }

            const chatBox = document.getElementById('chatContainer');
            if(chatBox) {
                chatBox.innerHTML = '';
                if (globalSystemState.chats) {
                    globalSystemState.chats.forEach(c => {
                        let div = document.createElement('div');
                        div.className = "chat-msg" + (c.isWarning ? " warning" : "");
                        div.innerHTML = `<strong>${c.sender}:</strong> ${c.text}`;
                        chatBox.appendChild(div);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            }

            const taskFeed = document.getElementById('liveTaskFeed');
            if(taskFeed) {
                taskFeed.innerHTML = '';
                if (globalSystemState.tasks && Object.keys(globalSystemState.tasks).length > 0) {
                    Object.keys(globalSystemState.tasks).forEach(key => {
                        const t = globalSystemState.tasks[key];
                        let item = document.createElement('div');
                        item.className = "task-list-item";
                        item.innerHTML = `
                            <strong>ID:</strong> <code style="background:#f1f3f5; padding:2px 6px; border-radius:4px;">${t.id}</code> | <strong>Title:</strong> ${t.title} <br>
                            <div style="margin-top: 5px;">
                                <strong>Budget:</strong> ৳${t.budget} | <strong>Status:</strong> <span class="status-tag status-${t.status}">${t.status}</span>
                            </div>
                            <small style="color: #7f8c8d; display:block; margin-top:5px;">Agency: ${t.agencyName} | Worker: ${t.claimedByName || 'None'}</small>
                        `;
                        taskFeed.appendChild(item);
                    });
                } else {
                    taskFeed.innerHTML = "কোনো কাজ লাইভ নেই...";
                }
            }
        }
    </script>
