<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        // ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyD5rY0AR39UOWFa1RtWwb5oYLendr--RGs",
            authDomain: "sohoz-cfe38.firebaseapp.com",
            projectId: "sohoz-cfe38",
            storageBucket: "sohoz-cfe38.firebasestorage.app",
            messagingSenderId: "206146864882",
            appId: "1:206146864882:web:5a3680ae96ecbf4106726b",
            measurementId: "G-7WFLVEPETJ"
        };

        // ফায়ারবেস ইনিশিয়ালাইজেশন
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // 🛡️ হোয়াইট স্ক্রিন প্রোটেকশন গার্ড (যাতে কোনো ID মিসিং থাকলে ক্র্যাশ না করে)
        const originalGetElementById = document.getElementById;
        document.getElementById = function(id) {
            const el = originalGetElementById.apply(document, arguments);
            if (!el) {
                return { classList: { add: () => {}, remove: () => {}, contains: () => false }, style: {}, files: [], value: "" };
            }
            return el;
        };

        // গ্লোবাল কনফিগারেশন ও ফি (ফ্লোচার্ট অনুযায়ী)
        const AGENCY_FEE_PERCENT = 0.05; 
        const USER_FEE_PERCENT = 0.05;   

        let currentUserData = null;
        let globalSystemState = {};

        // অ্যালার্ট সিস্টেম
        function showAlert(msg) {
            const box = originalGetElementById.apply(document, ['alertBox']);
            if (box) {
                box.innerText = msg;
                box.style.display = 'block';
                setTimeout(() => { box.style.display = 'none'; }, 5000);
            } else {
                alert(msg);
            }
        }

        // স্ক্রিন কন্ট্রোল
        function showAuthScreen() {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('mainPlatform').classList.add('hidden');
            document.getElementById('mainNavbar').classList.add('hidden');
        }

        function showMainPlatform() {
            if (!currentUserData) return;
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainPlatform').classList.remove('hidden');
            document.getElementById('mainNavbar').classList.remove('hidden');
            
            document.getElementById('displayUserName').innerText = currentUserData.name + ` (${currentUserData.role.toUpperCase()})`;
            
            if (currentUserData.role === 'agency') {
                document.getElementById('agencySection').classList.remove('hidden');
                document.getElementById('workerSection').classList.add('hidden');
            } else {
                document.getElementById('agencySection').classList.add('hidden');
                document.getElementById('workerSection').classList.remove('hidden');
            }
        }

        // ১. [AGENCY] অ্যাকাউন্ট তৈরি ও লগইন
        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            const role = document.getElementById('authRole').value;
            const name = document.getElementById('authName').value.trim();
            const isRegister = !document.getElementById('registerFields').classList.contains('hidden');

            if (!email || !password) { showAlert("ইমেইল এবং পাসওয়ার্ড সঠিকভাবে দিন!"); return; }

            try {
                if (isRegister) {
                    if (!name) { showAlert("দয়া করে নাম লিখুন!"); return; }
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const uid = userCredential.user.uid;
                    
                    const defaultUserData = {
                        name: name,
                        email: email,
                        role: role,
                        balance: role === 'agency' ? 1000 : 0, // অ্যাকাউন্ট খোলার পর ব্যালেন্স জমা
                        isVerified: false,
                        claimsToday: 0,
                        rating: 0.0,
                        totalRatingsCount: 0
                    };
                    await set(ref(db, 'users/' + uid), defaultUserData);
                    currentUserData = defaultUserData;
                    currentUserData.uid = uid;
                    showMainPlatform();
                    showAlert("অ্যাকাউন্ট তৈরি সফল হয়েছে!");
                } else {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const snapshot = await get(ref(db, 'users/' + userCredential.user.uid));
                    if (snapshot.exists()) {
                        currentUserData = snapshot.val();
                        currentUserData.uid = userCredential.user.uid;
                        showMainPlatform();
                    }
                    showAlert("লগইন সফল হয়েছে!");
                }
            } catch (error) {
                showAlert("ত্রুটি: " + error.message);
            }
        }

        function toggleAuthMode() {
            const regFields = document.getElementById('registerFields');
            const authBtn = document.getElementById('authBtn');
            const toggleLink = document.getElementById('toggleLink');
            if (regFields.classList.contains('hidden')) {
                regFields.classList.remove('hidden');
                authBtn.innerText = "রেজিস্ট্রেশন করুন";
                toggleLink.innerText = "ইতিমধ্যেই অ্যাকাউন্ট আছে? লগইন করুন";
            } else {
                regFields.classList.add('hidden');
                authBtn.innerText = "লগইন করুন";
                toggleLink.innerText = "নতুন অ্যাকাউন্ট তৈরি করতে চান? রেজিস্টার করুন";
            }
        }

        function handleLogout() {
            signOut(auth).then(() => {
                document.getElementById('adminPanelCard').classList.add('hidden');
                showAlert("লগআউট সফল হয়েছে!");
            });
        }

        // ২. [AGENCY] Task Upload ও ৩. [SYSTEM] অটো ব্যালেন্স লক (Escrow-তে Hold)
        async function uploadTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const budget = Number(document.getElementById('taskBudget').value);
            const desc = document.getElementById('taskDesc').value.trim();

            if (!title || !budget) { showAlert("টাইটেল এবং বাজেট সঠিকভাবে লিখুন!"); return; }
            if (currentUserData.balance < budget) { showAlert("আপনার ওয়ালেটে পর্যাপ্ত ব্যালেন্স নেই! আগে ব্যালেন্স জমা করুন।"); return; }

            // ব্যালেন্স কাটা এবং Escrow তে লক করা একসাথেই হবে সিস্টেমে
            const newBalance = currentUserData.balance - budget;
            const taskId = "task_" + Date.now();

            const newTask = {
                id: taskId,
                title: title,
                description: desc,
                budget: budget,
                status: "LOCKED_IN_ESCROW", // ফ্লোচার্ট ৩ নং ধাপ: সরাসরি সিস্টেমে Lock হয়ে থাকবে
                agencyUid: currentUserData.uid,
                agencyName: currentUserData.name,
                claimedByUid: "",
                claimedByName: "",
                escrowAmount: budget,
                submissionProof: "",
                agencyConfirmed: false,
                userConfirmed: false
            };

            await update(ref(db, 'users/' + currentUserData.uid), { balance: newBalance });
            await set(ref(db, 'tasks/' + taskId), newTask);

            showAlert(`টাস্ক পাবলিশড এবং বাজেট ৳${budget} সিস্টেমে সফলভাবে লক করা হয়েছে!`);
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskBudget').value = '';
            document.getElementById('taskDesc').value = '';
        }

        // ৪. [USER] অ্যাকাউন্ট ভেরিফাই করে Task Claim করা
        async function verifyUserWithNid() {
            await update(ref(db, 'users/' + currentUserData.uid), { isVerified: true });
            showAlert("আপনার অ্যাকাউন্ট ভেরিফাই করা হয়েছে! এখন কাজ ক্লেইম করতে পারবেন।");
        }

        async function claimTask() {
            const taskId = document.getElementById('claimTaskId').value.trim();
            if (!taskId) { showAlert("টাস্ক আইডি দিন!"); return; }
            
            // ভেরিফাই ছাড়া টাস্ক ক্লেইম করা যাবে না (ফ্লোচার্ট ৪ নং ধাপ)
            if (!currentUserData.isVerified) { showAlert("অ্যাকাউন্ট ভেরিফাই ছাড়া Task Claim করা যাবে না!"); return; }

            const taskSnapshot = await get(ref(db, 'tasks/' + taskId));
            if (!taskSnapshot.exists()) { showAlert("এই আইডির কোনো কাজ পাওয়া যায়নি!"); return; }
            
            const task = taskSnapshot.val();
            if (task.status !== "LOCKED_IN_ESCROW") { showAlert("এই কাজটি ক্লেইম করার উপযোগী নয় বা ইতিমধ্যে কেউ নিয়ে নিয়েছে।"); return; }

            await update(ref(db, 'tasks/' + taskId), {
                status: "CLAIMED",
                claimedByUid: currentUserData.uid,
                claimedByName: currentUserData.name
            });

            showAlert("কাজটি সফলভাবে ক্লেইম হয়েছে! এখন এজেন্সির টেস্ট বা যাচাইয়ের জন্য অপেক্ষা করুন।");
            document.getElementById('claimTaskId').value = '';
        }

        // ৫. [AGENCY] User-কে Test করে Order Confirm করা
        async function agencyConfirmOrder() {
            const taskId = document.getElementById('agencyTestTaskId').value.trim();
            if (!taskId) { showAlert("টাস্ক আইডি দিন!"); return; }

            const taskSnapshot = await get(ref(db, 'tasks/' + taskId));
            if (!taskSnapshot.exists()) { showAlert("টাস্ক পাওয়া যায়নি!"); return; }

            const task = taskSnapshot.val();
            if (task.status !== "CLAIMED") { showAlert("টাস্কটি আগে কোনো ইউজার দ্বারা ক্লেইম হতে হবে।"); return; }

            await update(ref(db, 'tasks/' + taskId), { status: "ORDER_CONFIRMED" });
            showAlert("ইউজার স্কিল যাচাই সফল! আপনি অর্ডারটি কনফার্ম করেছেন। ইউজার এখন কাজ শুরু করতে পারবে।");
            document.getElementById('agencyTestTaskId').value = '';
        }

        // ৬. [USER] কাজ Complete করে Submit করা (Admin Support Panel-এ জমা দেওয়া)
        async function userSubmitWork() {
            const taskId = document.getElementById('submitTaskId').value.trim();
            const proof = document.getElementById('workProofInput').value.trim();

            if (!taskId || !proof) { showAlert("টাস্ক আইডি এবং কাজের লিংক/প্রুফ সঠিকভাবে দিন!"); return; }

            const taskSnapshot = await get(ref(db, 'tasks/' + taskId));
            if (!taskSnapshot.exists()) { showAlert("টাস্ক পাওয়া যায়নি!"); return; }

            const task = taskSnapshot.val();
            if (task.status !== "ORDER_CONFIRMED") { showAlert("অর্ডার কনফার্ম হওয়ার আগে সাবমিট করা যাবে না।"); return; }

            await update(ref(db, 'tasks/' + taskId), {
                status: "SUBMITTED_TO_ADMIN",
                submissionProof: proof
            });

            showAlert("আপনার কাজ সফলভাবে সাবমিট হয়েছে এবং তা অ্যাডমিন সাপোর্ট প্যানেলে জমা হয়েছে!");
            document.getElementById('submitTaskId').value = '';
            document.getElementById('workProofInput').value = '';
        }

        // ৭. [ADMIN] উভয়ের Confirmation দেখে ও ৮. [SYSTEM] Locked Balance Release করা
        async function adminReleasePayment(isSuccess) {
            const taskId = document.getElementById('adminTaskId').value.trim();
            const agencyConf = originalGetElementById.apply(document, ['agencyConf']);
            const userConf = originalGetElementById.apply(document, ['userConf']);

            if (!taskId) { showAlert("টাস্ক আইডি দিন!"); return; }

            const taskSnapshot = await get(ref(db, 'tasks/' + taskId));
            if (!taskSnapshot.exists()) { showAlert("টাস্ক পাওয়া যায়নি!"); return; }
            const task = taskSnapshot.val();

            if (isSuccess) {
                // ফ্লোচার্ট ৭ নং ধাপ: এজেন্সি ও ইউজার দুই দিক থেকে অ্যাপ্রুভ/কনফার্মেশন থাকতে হবে
                if ((agencyConf && !agencyConf.checked) || (userConf && !userConf.checked)) { 
                    showAlert("ম্যানুয়াল রিলিজের জন্য এজেন্সি ও ইউজার উভয়ের কনফার্মেশন বক্সে টিক দিন!"); 
                    return; 
                }

                // ফ্লোচার্ট ৮ নং ধাপ: Locked Balance Release (Agency fee + User fee কেটে বাকিটা User পাবে)
                const totalBudget = task.escrowAmount;
                const agencyFee = totalBudget * AGENCY_FEE_PERCENT;
                const userFee = totalBudget * USER_FEE_PERCENT;
                const companyProfit = agencyFee + userFee;
                const finalUserPayout = totalBudget - userFee;

                // ওয়ার্কারের একাউন্টে টাকা পাঠানো
                const workerSnapshot = await get(ref(db, 'users/' + task.claimedByUid));
                if (workerSnapshot.exists()) {
                    const worker = workerSnapshot.val();
                    await update(ref(db, 'users/' + task.claimedByUid), {
                        balance: (worker.balance || 0) + finalUserPayout
                    });
                }

                // সিস্টেম বা কোম্পানির লাভ জমা করা
                const currentEarnings = globalSystemState.companyEarnings || 0;
                await set(ref(db, 'companyEarnings'), currentEarnings + companyProfit);

                // ৯. [END] Task Post "Completed" Mark হওয়া
                await update(ref(db, 'tasks/' + taskId), { status: "COMPLETED" });
                showAlert("অ্যাডমিন কনফার্মেশন সফল! ব্যালেন্স রিলিজ হয়েছে এবং টাস্ক COMPLETED মার্ক করা হয়েছে।");
            } else {
                // কাজ রিজেক্ট বা ক্যানসেল হলে এজেন্সি ফান্ড ফেরত পাবে
                const agencySnapshot = await get(ref(db, 'users/' + task.agencyUid));
                if (agencySnapshot.exists()) {
                    const agency = agencySnapshot.val();
                    await update(ref(db, 'users/' + task.agencyUid), { balance: (agency.balance || 0) + task.escrowAmount });
                }
                await update(ref(db, 'tasks/' + taskId), { status: "CANCELLED", escrowAmount: 0 });
                showAlert("অ্যাডমিন দ্বারা কাজ বাতিল করে সম্পূর্ণ ফান্ড এজেন্সিকে ফেরত দেওয়া হয়েছে!");
            }
            document.getElementById('adminTaskId').value = '';
        }

        // ৯. [END] Rating ও Review দেওয়ার সুযোগ উভয় পক্ষের
        async function submitReview() {
            const targetUid = document.getElementById('reviewTargetUid').value.trim();
            const ratingValue = Number(document.getElementById('reviewRatingValue').value);

            if (!targetUid || !ratingValue) { showAlert("ইউজার আইডি এবং রেটিং (১-৫) সঠিকভাবে দিন!"); return; }

            const userSnapshot = await get(ref(db, 'users/' + targetUid));
            if (!userSnapshot.exists()) { showAlert("উক্ত ইউজার ডাটাবেজে পাওয়া যায়নি!"); return; }

            const userData = userSnapshot.val();
            const newCount = (userData.totalRatingsCount || 0) + 1;
            const currentRating = userData.rating || 0;
            const newRating = ((currentRating * (newCount - 1)) + ratingValue) / newCount;

            await update(ref(db, 'users/' + targetUid), {
                rating: Number(newRating.toFixed(1)),
                totalRatingsCount: newCount
            });

            showAlert("আপনার রেটিং ও রিভিউ সফলভাবে জমা হয়েছে!");
            document.getElementById('reviewTargetUid').value = '';
            document.getElementById('reviewRatingValue').value = '';
        }

        // এজেন্সি ডিপোজিট (ব্যালেন্স জমা করার টেস্ট মেথড)
        async function agencyDeposit() {
            if (!currentUserData) return;
            const newBalance = (currentUserData.balance || 0) + 500;
            await update(ref(db, 'users/' + currentUserData.uid), { balance: newBalance });
            showAlert("৳৫০০ ব্যালেন্স সফলভাবে জমা (Deposit) হয়েছে!");
        }

        // অ্যাডমিন প্যানেল সিক্রেট লগইন

            const id = document.getElementById('modalAdminId').value.trim();
            const pass = document.getElementById('modalAdminPass').value.trim();

            if (id === "236533" && pass === "Fahad236533") {
                closeAdminModal();
                const adminPanel = originalGetElementById.apply(document, ['adminPanelCard']);
                if (adminPanel) {
                    adminPanel.classList.remove('hidden');
                    showAlert("👨‍⚖️ অ্যাডমিন কন্ট্রোল প্যানেল সফলভাবে আনলক হয়েছে!");

            } else {
                showAlert("❌ ভুল অ্যাডমিন আইডি বা পাসওয়ার্ড!");

        function closeAdminModal() {
            document.getElementById('adminAuthModal').classList.add('hidden');
            document.getElementById('modalAdminId').value = '';
            document.getElementById('modalAdminPass').value = '';
        }

        // ইন্টারফেস লাইভ আপডেট ও ফিড রেন্ডারিং
        function updateUI() {
            if (!currentUserData) return;

            const myLatestData = globalSystemState.users ? globalSystemState.users[currentUserData.uid] : null;
            if (myLatestData) {
                const isAgency = currentUserData.role === 'agency';
                const balEl = originalGetElementById.apply(document, [isAgency ? 'agencyBalance' : 'userBalance']);
                if (balEl) balEl.innerText = myLatestData.balance || 0;

                const vBadge = originalGetElementById.apply(document, [isAgency ? 'agencyVerifyBadge' : 'userVerifyBadge']);
                if (vBadge) {
                    vBadge.innerText = myLatestData.isVerified ? "ভেরিফাইড ✓" : "আনভেরিফাইড";
                    vBadge.className = "badge " + (myLatestData.isVerified ? 'badge-verified' : 'status-DISPUTED');
                }
                
                const uRat = originalGetElementById.apply(document, [isAgency ? 'agencyRating' : 'userRating']);
                if (uRat) uRat.innerText = (myLatestData.rating || 0).toFixed(1) + " ★";
            }

            const compEarn = originalGetElementById.apply(document, ['companyEarnings']);
            if(compEarn) compEarn.innerText = globalSystemState.companyEarnings || 0;

            const taskFeed = originalGetElementById.apply(document, ['liveTaskFeed']);
            if(taskFeed) {
                taskFeed.innerHTML = '';
                if (globalSystemState.tasks && Object.keys(globalSystemState.tasks).length > 0) {
                    Object.keys(globalSystemState.tasks).forEach(key => {
                        const t = globalSystemState.tasks[key];
                        let item = document.createElement('div');
                        item.className = "task-list-item";
                        item.innerHTML = `
                            <strong>ID:</strong> <code style="background:#f1f3f5; padding:2px 6px; border-radius:4px;">${t.id}</code> | <strong>Title:</strong> ${t.title} <br>
                            <div style="margin-top: 5px;">
                                <strong>Budget:</strong> ৳${t.budget} | <strong>Status:</strong> <span class="status-tag status-${t.status}">${t.status}</span>
                            </div>
                            <small style="color: #7f8c8d; display:block; margin-top:5px;">Agency: ${t.agencyName} | Worker: ${t.claimedByName || 'None'}</small>
                            ${t.submissionProof ? `<small style="color: #2980b9; display:block;"><strong>Admin Proof:</strong> ${t.submissionProof}</small>` : ''}
                        `;
                        taskFeed.appendChild(item);
                    });
                } else {
                    taskFeed.innerHTML = "কোনো কাজ লাইভ নেই...";
                }
            }
        }

        // অথেনটিকেশন স্টেট পর্যবেক্ষণ লুপ
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snapshot = await get(ref(db, 'users/' + user.uid));
                if (snapshot.exists()) {
                    currentUserData = snapshot.val();
                    currentUserData.uid = user.uid;
                    showMainPlatform();
                }
            } else {
                currentUserData = null;
                showAuthScreen();
            }
        });

        // লাইভ ডাটা সিঙ্ক লিসেনার
        onValue(ref(db), (snapshot) => {
            if (snapshot.exists()) {
                globalSystemState = snapshot.val();
                
                const jsonDisp = originalGetElementById.apply(document, ['jsonDisplay']);
                if(jsonDisp) jsonDisp.textContent = JSON.stringify(globalSystemState, null, 4);
                
                if (auth.currentUser && globalSystemState.users && globalSystemState.users[auth.currentUser.uid]) {
                    currentUserData = globalSystemState.users[auth.currentUser.uid];
                    currentUserData.uid = auth.currentUser.uid;
                    showMainPlatform(); 
                }
                updateUI();
            }
        });

        // কি-বোর্ড শর্টকাট (Ctrl + Shift + A) অ্যাডমিন প্যানেল ওপেনিং
        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && (e.key === 'A' || e.key === 'a')) {
                e.preventDefault();
                const adminPanel = originalGetElementById.apply(document, ['adminPanelCard']);
                if (adminPanel) {
                    if (!adminPanel.classList.contains('hidden')) {
                        adminPanel.classList.add('hidden');
                        showAlert("🔒 অ্যাডমিন প্যানেল হাইড করা হয়েছে!");
                    } else {
                        const modal = originalGetElementById.apply(document, ['adminAuthModal']);
                        if (modal) modal.classList.remove('hidden');
                    }
                }
            }
        });

        // ফাংশনগুলো উইন্ডো অবজেক্টে এক্সপোর্ট করা (যাতে HTML onclick ট্রিগার পায়)
        window.handleAuth = handleAuth;
        window.toggleAuthMode = toggleAuthMode;
        window.handleLogout = handleLogout;
        window.agencyDeposit = agencyDeposit;
        window.uploadTask = uploadTask;
        window.verifyUserWithNid = verifyUserWithNid;
        window.claimTask = claimTask;
        window.agencyConfirmOrder = agencyConfirmOrder;
        window.userSubmitWork = userSubmitWork;
        window.submitAdminCredentials = submitAdminCredentials;
        window.closeAdminModal = closeAdminModal;
        window.adminReleasePayment = adminReleasePayment;
        window.submitReview = submitReview;

    </script>
